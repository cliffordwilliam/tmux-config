# ~/.tmux.conf — ephemeral, foot-bound tmux. No persistence by design.
# One foot window = one tmux session = many named windows ("tabs").
# No split panes: one full-screen thing at a time, move left/right or pick from a list.

# --- Truecolor + correct TERM inside sessions (foot is the outer terminal) ---
# Declare truecolor via terminal-features (RGB), the modern (tmux 3.2+) form,
# rather than the old `terminal-overrides ",foot*:Tc"`. RGB is the standardised
# terminfo capability that terminfo-probing apps look for; Tc is the tmux-only
# predecessor. Both make tmux pass 24-bit through; RGB also advertises it inward.
# This is correct hygiene for foot-in-tmux — keep it — but note it was NOT the
# cause of Claude Code's "orange looks pink" symptom: that was Node's color
# detection capping at 256 when $TMUX is set (fixed via `TMUX= claude` alias in
# the bash config), unrelated to this line.
set -g default-terminal "tmux-256color"
set -as terminal-features ",foot*:RGB"

# --- Ephemeral lifecycle ---------------------------------------------------
# When the last client (this foot window) goes away, destroy the session, which
# empties the server so it exits too. Nothing survives in the background to be
# reattached later. This is the "no persistence" behaviour, on purpose.
# NOTE: assumes ONE session per foot. Create windows (tabs), not sessions.
set -g destroy-unattached on

# --- Sane defaults ---------------------------------------------------------
set -g mouse on                 # click a window in the top bar to switch; scroll history
set -g history-limit 50000
set -g base-index 1             # windows numbered from 1 (matches the number row)
set -g renumber-windows on      # closing a window renumbers the rest — no gaps
setw -g automatic-rename off    # keep the names YOU give windows
set -g status-position top      # window list along the top

# Strip the clutter: no session name (left), no date/time (right) — you already
# have those in the Ubuntu top bar.
set -g status-left ""
set -g status-right ""

# Show ONLY the active window's name in the bar, not the whole tab list.
# Inactive windows render as nothing; use the picker (prefix + f) to switch.
# Leading space so the first letter isn't flush against the screen edge.
set -g window-status-format ""
set -g window-status-current-format " #W"
# Kill the separator between windows. Hidden (empty) inactive tabs still emit
# their separators otherwise, so each extra tab piles another space in front of
# the active name. Empty separator = constant one-space padding, any tab count.
set -g window-status-separator ""

# --- Theme: gruvbox / retrobox --------------------------------------------
# tmux has no built-in named themes; "gruvbox" is just these color settings.
# Palette (gruvbox dark): bg0 #282828, bg1 #3c3836, fg #ebdbb2,
# yellow #fabd2f, orange #fe8019. Retrobox uses the same colors.
# You never split — one full-width window at a time — so make the WHOLE top bar
# the accent color instead of a title-length pill. That's full width AND higher
# contrast: no dark gap around the text. Bright gruvbox yellow (#fabd2f) with
# near-black text (#1d2021, gruvbox's darkest bg) is the highest-contrast pair
# in the palette. Swap #fabd2f for #fe8019 (orange) if yellow is too loud.
set -g status-style "bg=#fabd2f,fg=#1d2021"
# The active window name — same bg as the bar so it's a seamless full-width
# block, just bold so the name still stands out.
set -g window-status-current-style "bg=#fabd2f,fg=#1d2021,bold"

# The selection bar in copy-mode and in the "prefix + f" window picker
# (choose-tree). Unset, this falls back to tmux's default mode-style
# (bg=yellow,fg=black), which are PALETTE colors: foot resolves them to
# gruvbox's dimmer normal yellow (#d79921) and near-black (#282828) — a muddy,
# low-contrast pair that's hard to read where the cursor sits. Pin it to the
# same highest-contrast gruvbox pair as the bar (near-black on bright yellow).
set -g mode-style "bg=#fabd2f,fg=#1d2021"

# --- Prefix: Ctrl-Space instead of Ctrl-b -----------------------------------
# (Ctrl-j is the same byte as Enter/newline, so it collides with shells/REPLs.)
# To go back to the tmux default, just delete these three lines.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix        # press Ctrl-Space twice to send a literal one

# --- New window ("n") ALWAYS asks for a name first; rename with "r" ---------
# This is the direct fix for "a new window I can't tell apart."
bind n command-prompt -p "new window name:" "new-window -c '#{pane_current_path}' -n '%%'"
bind r command-prompt -p "rename window:"    "rename-window '%%'"

# --- Move left / right between windows -------------------------------------
# vim-style h/l, plus the arrow keys, both under the prefix.
bind h previous-window
bind l next-window
bind Left  previous-window
bind Right next-window

# --- One-key vertical picker of every window (your Firefox-sidebar wish) ----
# -N starts the picker with no preview pane -- just the window list, which is
# all we want. (tmux's tree mode has a built-in v key that can still summon the
# preview; there's no setting to remove it, but -N means it never shows on its
# own.)
bind f choose-tree -Zw -N

# --- Reload this file without restarting tmux (capital R; r is rename) -----
bind R source-file ~/.tmux.conf \; display "tmux.conf reloaded"
